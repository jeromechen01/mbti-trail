<!DOCTYPE html>
<html lang="zh-CN" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#6366F1" />
  <meta name="description" content="16 型人格测试 · 探索你的人格类型 · 中英双语 · 移动端友好" />
  <title>16 型人格测试 · 探索你的人格类型</title>

  <!-- Tailwind CSS（Play CDN） -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary:   '#6366F1',
            secondary: '#EC4899',
            accent:    '#F59E0B'
          },
          borderRadius: { card: '16px', btn: '12px' },
          fontFamily: {
            sans: ['-apple-system','BlinkMacSystemFont','"PingFang SC"','"Microsoft YaHei"','sans-serif']
          }
        }
      }
    };
  </script>

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- html2canvas（用于生成分享图） -->
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root {
      --primary:   #6366F1;
      --secondary: #EC4899;
      --accent:    #F59E0B;
    }
    [x-cloak] { display: none !important; }
    html { -webkit-tap-highlight-color: transparent; }
    html, body { overscroll-behavior: contain; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* 页面切换淡入 */
    .page-fade { animation: pageFade .35s ease-out; }
    @keyframes pageFade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    /* 结果页字母依次浮现 */
    .letter-reveal { display: inline-block; opacity: 0; animation: letterIn .7s ease-out forwards; }
    @keyframes letterIn {
      from { opacity: 0; transform: translateY(30px) scale(.8); }
      to   { opacity: 1; transform: none; }
    }
    /* 题目页 Likert 圆点 */
    .likert-dot { transition: all .2s ease; cursor: pointer; user-select: none; }
    .likert-dot:hover { transform: scale(1.12); }
    .likert-dot.is-selected {
      background: var(--primary) !important;
      border-color: var(--primary) !important;
      box-shadow: 0 6px 20px rgba(99,102,241,.4);
    }
    /* 维度条游标 */
    .dim-marker {
      position: absolute; top: 50%;
      width: 18px; height: 18px; border-radius: 50%;
      background: white; border: 3px solid #1F2937;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
      transition: left .8s cubic-bezier(.4,0,.2,1);
    }
    .dark .dim-marker { background: #0f172a; border-color: white; }
    /* 锁定 Tab 遮罩 */
    .tab-locked-overlay {
      position: absolute; inset: 0;
      backdrop-filter: blur(6px);
      background: rgba(255,255,255,.55);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      gap: 12px; z-index: 5; border-radius: 16px;
    }
    .dark .tab-locked-overlay { background: rgba(15,23,42,.55); }
    /* 横滚轴 */
    .horiz-scroll::-webkit-scrollbar { height: 6px; }
    .horiz-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 4px; }
    /* 二维码占位（棋盘格） */
    .qrcode-placeholder {
      background:
        repeating-conic-gradient(#1F2937 0% 25%, #fff 0% 50%) 50% / 14px 14px;
    }
    /* 加载页填充 */
    .loading-fill { transition: width 1s linear; }
    /* 16 型卡片 hover 高亮 */
    .type-cell { transition: transform .2s, box-shadow .2s; }
    .type-cell:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,0,0,.08); }
    /* ============ 灵魂版深度报告 ============ */
    /* 标语金句卡（hero 下方大字） */
    .deep-tagline-card {
      padding: 1.25rem 1.5rem;
      border-radius: 16px;
      font-style: italic;
      font-weight: 500;
      font-size: 1.25rem;
      line-height: 1.6;
      text-align: center;
      border: 1px solid rgba(0,0,0,.05);
    }
    @media (min-width: 640px) { .deep-tagline-card { font-size: 1.625rem; padding: 1.75rem 2rem; } }
    .dark .deep-tagline-card { border-color: rgba(255,255,255,.08); }

    /* 章节卡片 */
    .deep-chapter-card {
      position: relative;
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(0,0,0,.06);
      transition: transform .2s, box-shadow .2s;
      overflow: hidden;
    }
    .dark .deep-chapter-card { background: rgb(30 41 59); border-color: rgba(255,255,255,.06); }
    .deep-chapter-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.06); }
    .deep-chapter-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      color: white; font-weight: 700; font-size: 0.95rem;
      flex-shrink: 0;
    }
    .deep-chapter-title {
      font-size: 1.25rem; font-weight: 700; line-height: 1.3;
    }
    @media (min-width: 640px) { .deep-chapter-title { font-size: 1.5rem; } }
    .deep-chapter-content {
      font-size: 1rem; line-height: 1.85;
      color: rgb(55 65 81);
      white-space: pre-wrap;
      word-break: break-word;
    }
    @media (min-width: 640px) { .deep-chapter-content { font-size: 1.0625rem; } }
    .dark .deep-chapter-content { color: rgb(203 213 225); }

    /* 章节锁定遮罩 */
    .deep-chapter-locked-overlay {
      position: absolute; inset: 0;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,.78);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      gap: 14px; border-radius: 16px;
      padding: 1.5rem; text-align: center;
    }
    .dark .deep-chapter-locked-overlay { background: rgba(15,23,42,.78); }

    /* 扎心金句卡（黑底白字） */
    .pain-quote-card {
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      color: white;
      padding: 2.25rem 1.5rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 12px 36px rgba(15,23,42,.25);
    }
    .pain-quote-label {
      font-size: 0.75rem; letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
      margin-bottom: 0.75rem;
    }
    .pain-quote-text {
      font-size: 1.5rem; line-height: 1.55;
      font-weight: 600;
      font-style: italic;
    }
    @media (min-width: 640px) { .pain-quote-text { font-size: 2rem; } }

    /* 疗愈金句卡（金底深色） */
    .heal-quote-card {
      background: linear-gradient(135deg, #FCD34D 0%, #F59E0B 100%);
      color: #1F2937;
      padding: 2.25rem 1.5rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 12px 36px rgba(245,158,11,.25);
    }
    .heal-quote-label {
      font-size: 0.75rem; letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(31,41,55,.6);
      margin-bottom: 0.75rem;
    }
    .heal-quote-text {
      font-size: 1.5rem; line-height: 1.55;
      font-weight: 600;
    }
    @media (min-width: 640px) { .heal-quote-text { font-size: 2rem; } }

    /* ============ P2 关系匹配系统 ============ */
    /* 关系匹配首页入口卡 */
    .matching-entry-card {
      background: linear-gradient(135deg, #6366F1 0%, #EC4899 100%);
      color: white;
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 12px 36px rgba(99,102,241,.25);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .matching-entry-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 44px rgba(99,102,241,.35);
    }
    .matching-entry-card::after {
      content: '';
      position: absolute;
      right: -40px; top: -40px;
      width: 140px; height: 140px;
      background: rgba(255,255,255,.1);
      border-radius: 50%;
    }

    /* 信号灯 */
    .signal-light {
      width: 140px; height: 140px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
      margin: 0 auto;
    }
    .signal-light.green  { background: linear-gradient(135deg, #10B981, #059669); box-shadow: 0 10px 30px rgba(16,185,129,.35); }
    .signal-light.yellow { background: linear-gradient(135deg, #FCD34D, #F59E0B); color: #1F2937; box-shadow: 0 10px 30px rgba(245,158,11,.35); }
    .signal-light.orange { background: linear-gradient(135deg, #FB923C, #EA580C); box-shadow: 0 10px 30px rgba(234,88,12,.35); }
    .signal-light.red    { background: linear-gradient(135deg, #EF4444, #B91C1C); box-shadow: 0 10px 30px rgba(239,68,68,.35); }
    @media (min-width: 640px) { .signal-light { width: 180px; height: 180px; } }

    /* 三盘卡片 */
    .triple-card {
      background: white;
      border-radius: 18px;
      padding: 1.5rem;
      border: 1px solid rgba(0,0,0,.06);
      flex-shrink: 0;
      width: 320px;
      max-width: 92vw;
    }
    .dark .triple-card { background: rgb(30 41 59); border-color: rgba(255,255,255,.06); }

    /* 十维度折叠卡 */
    .dim-card {
      background: white;
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
      border: 1px solid rgba(0,0,0,.06);
      cursor: pointer;
      transition: background .15s;
    }
    .dark .dim-card { background: rgb(30 41 59); border-color: rgba(255,255,255,.06); }
    .dim-card:hover { background: #FAFAFA; }
    .dark .dim-card:hover { background: rgb(15 23 42); }

    /* 红绿灯专区 */
    .risk-card {
      background: #18181B;
      color: white;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 0.75rem;
      border-left: 6px solid #EF4444;
    }
    .risk-card .risk-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(239,68,68,.2);
      color: #FCA5A5;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: bold;
    }

    /* 流行梗建议卡 */
    .advice-card {
      background: white;
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
      border: 1px solid rgba(0,0,0,.06);
      border-left: 4px solid #6366F1;
    }
    .dark .advice-card { background: rgb(30 41 59); border-color: rgba(255,255,255,.06); }

    /* 结局预言区 */
    .ending-prophecy {
      background: linear-gradient(135deg, #1F2937, #374151);
      color: white;
      border-radius: 20px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      margin-top: 1.5rem;
    }
    .ending-prophecy .quote {
      font-size: 1.5rem;
      line-height: 1.6;
      font-weight: 600;
      font-style: italic;
    }
    @media (min-width: 640px) { .ending-prophecy .quote { font-size: 1.875rem; } }

    /* ============ P3 AI 关系咨询 · 小满 ============ */
    .chat-container {
      display: flex; flex-direction: column;
      height: calc(100vh - 3.5rem);
      max-width: 768px; margin: 0 auto;
    }
    .chat-header {
      flex-shrink: 0;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0,0,0,.06);
      background: white;
      display: flex; align-items: center; gap: 12px;
    }
    .dark .chat-header { background: rgb(30 41 59); border-color: rgba(255,255,255,.06); }
    .chat-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #C7D2FE, #818CF8);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .chat-online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #10B981; display: inline-block; margin-right: 4px;
      box-shadow: 0 0 6px rgba(16,185,129,.6);
    }
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 1.25rem 1rem;
      background: #FAFAFA;
    }
    .dark .chat-messages { background: rgb(15 23 42); }
    .chat-bubble {
      max-width: 84%;
      padding: 0.875rem 1rem;
      border-radius: 16px;
      font-size: 0.95rem; line-height: 1.65;
      margin-bottom: 0.75rem;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .chat-bubble.user {
      background: #6366F1; color: white;
      border-bottom-right-radius: 4px;
      margin-left: auto;
    }
    .chat-bubble.assistant {
      background: white; color: #1F2937;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(0,0,0,.04);
    }
    .dark .chat-bubble.assistant { background: rgb(30 41 59); color: rgb(229 231 235); border-color: rgba(255,255,255,.06); }
    .chat-bubble strong { font-weight: 700; }
    .chat-meta {
      font-size: 0.7rem;
      color: #94A3B8;
      margin-bottom: 0.25rem;
      padding: 0 0.25rem;
    }
    .chat-meta.user { text-align: right; }
    .chat-typing {
      display: inline-flex; gap: 4px; align-items: center;
    }
    .chat-typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #9CA3AF;
      animation: typingPulse 1.2s infinite;
    }
    .chat-typing span:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
      40% { opacity: 1; transform: scale(1); }
    }
    .chat-input-bar {
      flex-shrink: 0;
      padding: 12px;
      background: white;
      border-top: 1px solid rgba(0,0,0,.06);
      display: flex; gap: 8px; align-items: flex-end;
    }
    .dark .chat-input-bar { background: rgb(30 41 59); border-color: rgba(255,255,255,.06); }
    .chat-input {
      flex: 1;
      padding: 0.625rem 0.875rem;
      border: 1px solid rgba(0,0,0,.1);
      border-radius: 18px;
      background: #F8FAFC;
      font-size: 0.95rem;
      resize: none;
      max-height: 120px;
      min-height: 40px;
    }
    .dark .chat-input { background: rgb(15 23 42); border-color: rgba(255,255,255,.1); color: white; }

    /* AI 入口按钮（金色） */
    .ai-entry-btn {
      background: linear-gradient(135deg, #FCD34D, #F59E0B);
      color: #1F2937;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 8px 24px rgba(245,158,11,.25);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .ai-entry-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(245,158,11,.35); }
    .ai-entry-btn .ai-avatar-sm {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.5);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }

    /* 匹配加载页：阶段进度点 */
    .loading-phase-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(99,102,241,.3);
      transition: all .3s;
    }
    .loading-phase-dot.active {
      background: #6366F1;
      transform: scale(1.5);
    }

    /* 平衡型徽章 */
    .balanced-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(245,158,11,.15); color: #B45309;
      padding: 2px 8px; border-radius: 9999px; font-size: 11px; margin-left: 8px;
    }
    .dark .balanced-badge { background: rgba(245,158,11,.25); color: #FBBF24; }
  </style>
</head>

<body
  x-data="mbtiApp()"
  x-init="init()"
  x-cloak
  class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-200"
>

  <!-- ============================== TOP NAV ============================== -->
  <nav class="sticky top-0 z-30 bg-white/85 dark:bg-slate-900/85 backdrop-blur border-b border-gray-100 dark:border-slate-800">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="#/home" @click.prevent="go('home')" class="flex items-center gap-2 font-bold text-primary">
        <svg class="w-7 h-7" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2L2 7l10 5 10-5-10-5zm0 7L2 14l10 5 10-5-10-5z"/>
        </svg>
        <span x-text="t('siteName')">16 型人格测试</span>
      </a>
      <div class="flex items-center gap-1">
        <button @click="toggleLang()" class="px-2.5 py-1 rounded-btn text-sm hover:bg-gray-100 dark:hover:bg-slate-800 transition" :aria-label="t('a11y.toggleLang')">
          <span x-text="lang === 'zh' ? 'EN' : '中'">EN</span>
        </button>
        <button @click="toggleDark()" class="p-1.5 rounded-btn hover:bg-gray-100 dark:hover:bg-slate-800 transition" :aria-label="t('a11y.toggleDark')">
          <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <svg x-show="darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
        <button @click="go('types')" class="p-1.5 rounded-btn hover:bg-gray-100 dark:hover:bg-slate-800 transition hidden sm:inline-flex" :aria-label="t('a11y.types')">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <button @click="go('me')" class="p-1.5 rounded-btn hover:bg-gray-100 dark:hover:bg-slate-800 transition" :aria-label="t('a11y.me')">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- ============================== PAGE SLOTS ============================== -->
  <main class="max-w-5xl mx-auto">
    <!-- ============================== PAGE: HOME ============================== -->
    <div x-show="currentPage === 'home'" class="page-fade px-4 pt-6 sm:pt-10 pb-10">
      <!-- Hero -->
      <section class="text-center max-w-3xl mx-auto py-8 sm:py-14">
        <h1 class="text-3xl sm:text-5xl font-bold leading-tight mb-4" x-text="t('home.hero.title')">探索你的人格类型</h1>
        <p class="text-base sm:text-lg text-gray-600 dark:text-gray-300 mb-6" x-text="t('home.hero.subtitle')"></p>
        <button @click="beginTest('quick28')" class="inline-flex items-center justify-center gap-2 px-7 py-3 rounded-btn bg-primary text-white font-semibold shadow-lg shadow-primary/20 hover:shadow-xl transition" x-text="t('home.hero.cta')">立即开始</button>
        <p class="mt-4 text-xs text-gray-500 dark:text-gray-400" x-text="t('home.hero.note')"></p>
      </section>

      <!-- 关系匹配入口（P2） -->
      <section class="mt-2 mb-10">
        <div class="matching-entry-card max-w-3xl mx-auto" @click="go('matching-intro')">
          <div class="relative z-10">
            <div class="text-xs uppercase tracking-widest opacity-80 mb-1" x-text="t('home.matchingEntrySubtitle')"></div>
            <h3 class="text-2xl sm:text-3xl font-bold mb-2" x-text="t('home.matchingEntryTitle')"></h3>
            <p class="text-sm opacity-90 mb-4 max-w-md" x-text="t('home.matchingEntryDesc')"></p>
            <div class="flex items-center gap-3">
              <span class="inline-flex items-center px-4 py-2 rounded-btn bg-white text-primary font-semibold text-sm shadow" x-text="t('home.matchingEntryCta')"></span>
              <span class="text-sm opacity-80" x-text="t('home.matchingEntryPrice')"></span>
            </div>
          </div>
        </div>
      </section>

      <!-- Three tiers -->
      <section class="mt-6">
        <h2 class="text-center text-xl sm:text-2xl font-semibold mb-1" x-text="t('home.tiersTitle')"></h2>
        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mb-8" x-text="t('home.tiersSubtitle')"></p>

        <div class="grid sm:grid-cols-3 gap-4 sm:items-stretch">
          <!-- quick28 -->
          <div class="bg-white dark:bg-slate-800 rounded-card p-6 border border-gray-100 dark:border-slate-700 flex flex-col sm:order-1">
            <div class="text-sm text-gray-500 dark:text-gray-400" x-text="t('home.tier.quick28.name')">快速版</div>

              <button

                class="likert-dot rounded-full border-2 flex-shrink-0"
                :class="[
                  currentAnswerValue === val ? 'is-selected' : '',
                  i === 0 ? 'w-9 h-9 border-pink-300 dark:border-pink-700' :
                  i === 1 ? 'w-11 h-11 border-rose-300 dark:border-rose-700' :
                  i === 2 ? 'w-12 h-12 border-gray-300 dark:border-slate-600' :
                  i === 3 ? 'w-11 h-11 border-indigo-300 dark:border-indigo-700' :
                            'w-9 h-9 border-primary'
                ]"
                :aria-label="t('test.likertLabels')[i]"
              ></button>
            </template>
            <span class="text-xs text-gray-400 dark:text-gray-500 w-20 text-right" x-text="t('test.likertLabels')[4]"></span>

              <span x-text="t('test.prevBtn')"></span>

          <div class="absolute inset-0 rounded-full border-4 border-primary border-t-transparent animate-spin"></div>

        <h2 class="text-lg font-semibold mb-6" x-text="t('loading.title')"></h2>

            <template x-if="deepReport(result.code) && getQuote('taglineQuote')">

            </template>
          </div>
        </div>

            <template x-for="dim in (result.useAT ? ['EI','SN','TF','JP','AT'] : ['EI','SN','TF','JP'])" :key="dim">

                <div class="flex items-center justify-between text-xs mb-1.5">
                  <span class="text-gray-500 dark:text-gray-400 font-medium" x-text="dimLabel(dim,'left')"></span>
                  <span>
                    <span class="font-semibold text-sm" x-text="result.dimensions[dim].side + ' ' + result.dimensions[dim].percentToSide.toFixed(0) + '%'"></span>

            <h2 class="text-xl sm:text-2xl font-bold mb-1" :style="`color: ${typeData(result.code).themeColor}`" x-text="t('result.deepReport.sectionTitle')"></h2>
            <p class="text-sm text-gray-500 dark:text-gray-400" x-text="t('result.deepReport.sectionSubtitle')"></p>
            <p x-show="lang==='en'" class="text-xs text-amber-600 dark:text-amber-400 mt-2" x-text="t('result.deepReport.translationNote')"></p>
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-3" x-text="t('result.deepReport.scrollHint')"></p>
          </div>

          <!-- 10 章节卡片 -->
          <template x-for="n in 10" :key="n">
            <article class="deep-chapter-card" :style="`border-top: 4px solid ${typeData(result.code).themeColor}`">
              <div class="flex items-center gap-3 mb-3">
                <div class="deep-chapter-num" :style="`background: ${typeData(result.code).themeColor}`" x-text="String(n).padStart(2, '0')"></div>
                <div class="flex-1 min-w-0">
                  <div class="text-xs text-gray-400 uppercase tracking-wider" x-text="t('result.deepReport.chapterPrefix') + ' ' + n + ' ' + t('result.deepReport.chapterSuffix')"></div>
                  <h3 class="deep-chapter-title" x-text="chapterTitle(n)"></h3>
                </div>
              </div>

              <!-- 解锁状态：渲染完整章节内容 -->
              <template x-if="!isChapterLocked(n)">
                <div class="deep-chapter-content" x-text="chapterContent(n)"></div>
              </template>

              <!-- 锁定状态：模糊预览 + 升级 CTA -->
              <template x-if="isChapterLocked(n)">
                <div class="relative">

    /* ---------- 解锁码：占位密钥（上线前必须更换） ---------- */
    const UNLOCK_SECRET = 'mbti-secret-2026'; // TODO: rotate before production

    /* SHA-256 → uppercase hex string */
    async function sha256HexUpper(text) {
      const buf = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest('SHA-256', buf);
      return Array.from(new Uint8Array(hash))
        .map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
    }

    /**
     * 生成解锁码（admin.html 共用算法）
     * 自验证双段算法（见 DECISIONS.md D-018）：
     *   saltSeed = upper(hex(SHA-256(orderId + tier))).slice(0,4)
     *   checksum = upper(hex(SHA-256(SECRET + saltSeed + tier))).slice(0,4)
     *   code     = MBTI-{saltSeed}-{checksum}
     */
    async function generateUnlockCode(tier, orderId) {
      const saltSeed = (await sha256HexUpper(String(orderId) + tier)).slice(0, 4);
      const checksum = (await sha256HexUpper(UNLOCK_SECRET + saltSeed + tier)).slice(0, 4);
      return `MBTI-${saltSeed}-${checksum}`;
    }

    /**
     * 验证解锁码（无需订单号——码内含 saltSeed）
     * 返回 true/false。tier 已知（来自当前付费墙上下文）
     */
    async function verifyUnlockCode(rawCode, tier) {
      const code = (rawCode || '').toUpperCase().replace(/\s+/g, '');
      // 硬编码测试码（REMOVE-BEFORE-PRODUCTION）
      if (code === 'MBTI-TEST-STD0' && tier === 'standard93') return true;
      if (code === 'MBTI-TEST-PRO0' && tier === 'pro144')     return true;
      if (code === 'MBTI-TEST-MTCH' && tier === 'matching')   return true;
      if (code === 'MBTI-TEST-AI00' && tier === 'ai')         return true;
      // 形式检查
      const m = code.match(/^MBTI-([A-Z0-9]{4})-([A-Z0-9]{4})$/);
      if (!m) return false;
      const [, saltSeed, providedChecksum] = m;
      const expected = (await sha256HexUpper(UNLOCK_SECRET + saltSeed + tier)).slice(0, 4);
      return expected === providedChecksum;
    }

    /**
     * 计分引擎：将答案集计算成 MBTI 报告对象
     * @param {Object} answers - { q001: -2..+2, q002: -2..+2, ... }
     * @param {string} setCode - 'quick28' | 'standard93' | 'pro144'
     * @returns 完整结果对象
     */
    function calculateMBTI(answers, setCode) {
      const questions = window.QUESTIONS[setCode];
      const dims = ['EI','SN','TF','JP'];
      const useAT = setCode !== 'quick28';
      if (useAT) dims.push('AT');

      // 1) 累计每维度的原始分 & 该维度最大可能绝对值
      const raw = {}, maxAbs = {};
      dims.forEach(d => { raw[d] = 0; maxAbs[d] = 0; });
      for (const q of questions) {
        if (!dims.includes(q.dimension)) continue;
        const ans = answers[q.id];
        if (typeof ans !== 'number') continue;
        raw[q.dimension] += ans * q.direction * q.weight;
        maxAbs[q.dimension] += 2 * Math.abs(q.weight);
      }

      // 2) 归一化到 [-100, +100]
      const dimensions = {};
      const balanced = {};
      const letters = { EI:'', SN:'', TF:'', JP:'', AT:'' };
      const SIDE_MAP = {
        EI: { pos: 'E', neg: 'I' },
        SN: { pos: 'N', neg: 'S' },
        TF: { pos: 'T', neg: 'F' },
        JP: { pos: 'P', neg: 'J' },
        AT: { pos: 'A', neg: 'T' }
      };
      dims.forEach(d => {
        const norm = maxAbs[d] === 0 ? 0 : Math.round(raw[d] / maxAbs[d] * 100);
        // 边界规则：norm > 0 → 后字母（E/N/T/P/A）；norm <= 0（含 0）→ 前字母（I/S/F/J/T）
        // 全中立（norm=0）默认归到前字母一侧，符合"未表态时倾向稳态"的预期。
        const side = norm > 0 ? SIDE_MAP[d].pos : SIDE_MAP[d].neg;
        const percentToSide = 50 + Math.abs(norm) / 2;   // 50..100
        const positionPct = ((norm + 100) / 200) * 100;  // 0..100, 用于游标 left%
        dimensions[d] = { score: norm, side, percentToSide, positionPct };
        balanced[d] = Math.abs(norm) < 5;
        letters[d] = side;
      });

      // 3) 拼接类型代码
      const fourLetter = letters.EI + letters.SN + letters.TF + letters.JP;
      const code = useAT ? `${fourLetter}-${letters.AT}` : fourLetter;

      return {
        code, baseCode: fourLetter, useAT,
        atSuffix: useAT ? letters.AT : null,
        dimensions, balanced, setCode,
        timestamp: Date.now()
      };
    }

    function saveState(patch) {
      try {
        const cur = loadState() || {};
        const next = { ...cur, ...patch };
        localStorage.setItem(LS_KEY, JSON.stringify(next));
      } catch (e) { /* quota or private mode — silently ignore */ }
    }

          return this.currentQuestions.length;
        },
        get progressPct() {
          if (!this.totalQuestions) return 0;
          return Math.round(((this.currentQuestionIdx) / this.totalQuestions) * 100);
        },
        get currentAnswerValue() {
          const q = this.currentQuestion;
          if (!q) return null;
          return this.answers[q.id] ?? null;
        },
        answer(value) {
          const q = this.currentQuestion;
          if (!q) return;
          this.answers[q.id] = value;
          this.persistProgress();
          // 300ms 自动进入下一题
          setTimeout(() => {
            if (this.currentQuestionIdx < this.totalQuestions - 1) {
              this.currentQuestionIdx++;
              this.persistProgress();
            } else {
              this.finishTest();
            }
          }, 300);
        },
        prevQuestion() {
          if (this.currentQuestionIdx > 0) {
            this.currentQuestionIdx--;
            this.persistProgress();
          }
        },
        requestExitTest() {
          this.dialog = {
            open: true,
            message: this.t('test.exitConfirm'),
            onOk: () => { this.persistProgress(); this.go('home'); },
            onCancel: null
          };
        },
        persistProgress() {
          saveState({ testInProgress: {
            setCode: this.setCode,
            currentQuestionIdx: this.currentQuestionIdx,
            answers: this.answers,
            testStartedAt: this.testStartedAt
          }});
        },
        clearProgress() {
          const s = loadState() || {};
          delete s.testInProgress;
          localStorage.setItem(LS_KEY, JSON.stringify(s));
        },

         * 完成测试 → 加载页 → 结果页
         * ======================================================= */
        finishTest() {
          this.go('loading');
          this.loadingPct = 0;
          this.loadingTipIdx = 0;
          const tipsLen = this.t('loading.tips').length;
          let tick = 0;
          const interval = setInterval(() => {
            tick++;
            this.loadingPct = Math.min(100, tick * 30);
            this.loadingTipIdx = (this.loadingTipIdx + 1) % tipsLen;
            if (tick >= 3) {
              clearInterval(interval);
              setTimeout(() => this.commitResult(), 400);
            }
          }, 1000);
        },
        commitResult() {
          const result = calculateMBTI(this.answers, this.setCode);
          this.result = result;
          // 写入历史
          this.history.unshift({
            ...result,
            id: 'r' + result.timestamp,
            durationSec: Math.round((Date.now() - this.testStartedAt) / 1000)
          });
          if (this.history.length > 50) this.history.length = 50;
          saveState({ history: this.history });
          this.clearProgress();
          this.activeTab = 'profile';
          this.go('result', { type: result.code });

        /* =========================================================

        /**
         * 把 UI 表单中的 person 输入数据转换为引擎需要的完整 person 对象
         * （包含 bazi / astro 子结构）。
         */
        buildMatchingPerson(p) {
          const yr = parseInt(p.year, 10);
          const mo = parseInt(p.month, 10);
          const dy = parseInt(p.day, 10);
          const hr = (p.hour === null || p.hour === undefined || p.hour === '') ? null : parseInt(p.hour, 10);
          return {
            nickname: p.nickname,
            gender: p.gender,
            mbti: p.mbti,
            bazi:  window.BAZI  ? window.BAZI.calcBaziComplete(yr, mo, dy, hr, p.gender) : null,
            astro: window.ASTRO ? window.ASTRO.calcAstrologyComplete(yr, mo, dy, hr, p.city) : null
          };

        /**
         * 校验关系匹配输入，触发加载动画，6 秒后计算并跳转结果页。
         */
        startMatching() {
          if (!this.matchingPersonA.nickname || !this.matchingPersonB.nickname) {
            this.showToast(this.t('matching.inputValidationName'));
            return;
          }
          if (!this.matchingPersonA.mbti || !this.matchingPersonB.mbti) {
            this.showToast(this.t('matching.inputValidationMbti'));
            return;
          }
          // 检查解锁
          if (!this.unlocked.matching) {
            this.go('paywall', { tier: 'matching' });
            return;
          }
          this.go('matching-loading');
          this.matchingLoadingPct = 0;
          this.matchingLoadingPhase = 0;
          if (this.matchingLoadingTimer) clearInterval(this.matchingLoadingTimer);
          this.matchingLoadingTimer = setInterval(() => {
            this.matchingLoadingPct += 100 / 60;  // 6 秒 / 100ms tick = 60 ticks
            if (this.matchingLoadingPct < 25) this.matchingLoadingPhase = 0;
            else if (this.matchingLoadingPct < 50) this.matchingLoadingPhase = 1;
            else if (this.matchingLoadingPct < 75) this.matchingLoadingPhase = 2;
            else this.matchingLoadingPhase = 3;
            if (this.matchingLoadingPct >= 100) {
              clearInterval(this.matchingLoadingTimer);
              this.matchingLoadingTimer = null;
              this.runMatchingCompute();
            }
          }, 100);
        },

         * 实际执行匹配计算并跳到结果页。

        runMatchingCompute() {
          try {

            const B = this.buildMatchingPerson(this.matchingPersonB);
            this.matchingResult = window.MATCHING_ENGINE.calcMatching(A, B, this.matchingRelationType);
            this.matchingExpandedDim = '第一眼吸引';  // 默认展开第一维

        /* =========================================================
         * P3 AI 关系咨询 · 小满
         * ======================================================= */

        /**
         * 入口：从报告页 / 匹配页 / 个人中心点击进入 AI 对话页。
         * 自动校验解锁、注入首次问候、跳转。
         */
        openAiChat(fromContext) {
          if (!this.unlocked.ai) {
            this.go('paywall', { tier: 'ai' });
            return;
          }
          this.aiContext = { from: fromContext };
          // 若历史为空，注入开场白
          if (this.aiMessages.length === 0) {
            const tpl = (fromContext === 'matching' && this.matchingResult)
              ? this.t('ai.firstGreetingWithMatching')
                  .replace('{nameB}', this.matchingResult.personB.nickname)
                  .replace('{score}', this.matchingResult.totalScore)
              : this.t('ai.firstGreeting');
            this.aiMessages.push({ role: 'assistant', content: tpl, ts: Date.now() });
          }
          this.go('ai-chat');
          // 滚到底
          this.$nextTick(() => this.scrollChatToBottom());
        },

        scrollChatToBottom() {
          setTimeout(() => {
            const el = document.getElementById('chat-messages-area');
            if (el) el.scrollTop = el.scrollHeight;
          }, 50);
        },

        /**
         * 发送消息 + 流式接收 AI 响应。
         */
        async aiSend() {
          if (this.aiSending) return;
          const text = (this.aiInput || '').trim();
          if (!text) return;

          this.aiErrorMsg = '';
          this.aiMessages.push({ role: 'user', content: text, ts: Date.now() });
          this.aiInput = '';
          this.scrollChatToBottom();

          // 占位 assistant 消息（接收流式片段）
          const assistantIdx = this.aiMessages.length;
          this.aiMessages.push({ role: 'assistant', content: '', ts: Date.now(), streaming: true });
          this.aiSending = true;
          this.aiStreamingBuf = '';

          // 检查 Worker URL 是否被替换
          if (this.aiWorkerUrl.includes('your-account.workers.dev')) {
            this.aiMessages[assistantIdx].content = this.t('ai.workerNotConfigured');
            this.aiMessages[assistantIdx].streaming = false;
            this.aiSending = false;
            this.scrollChatToBottom();
            return;
          }

          // 准备 payload
          const payload = {
            code: this.aiUnlockCode || '',
            user: this.result ? {
              mbti: this.result.baseCode,
              dimensions: Object.fromEntries(Object.entries(this.result.dimensions || {}).map(([k, v]) => [k, v.score || v])),
              atSuffix: this.result.atSuffix
            } : { mbti: 'UNKNOWN' },
            partner: this.matchingResult ? {
              mbti: this.matchingResult.personB && this.matchingResult.personB.mbti,
              score: this.matchingResult.totalScore,
              relationType: this.matchingResult.relationType,
              signalsLevel: this.matchingResult.signalsLevel,
              signals: (this.matchingResult.signals || []).slice(0, 3)
            } : null,
            messages: this.aiMessages
              .filter((m, i) => i !== assistantIdx && !m.streaming)
              .map(m => ({ role: m.role, content: m.content }))
          };

          try {
            const resp = await fetch(this.aiWorkerUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (resp.status === 429) throw new Error('rate');
            if (resp.status === 403) throw new Error('unlock');
            if (!resp.ok) throw new Error('server');

            // 流式读取 SSE
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let sseBuf = '';

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              sseBuf += decoder.decode(value, { stream: true });

              // 按行处理 SSE
              const lines = sseBuf.split('\n');
              sseBuf = lines.pop() || '';

              for (const line of lines) {
                if (!line.startsWith('data:')) continue;
                const payloadLine = line.slice(5).trim();
                if (payloadLine === '[DONE]') continue;
                if (!payloadLine) continue;
                try {
                  const obj = JSON.parse(payloadLine);
                  const delta = (obj.choices && obj.choices[0] && obj.choices[0].delta && obj.choices[0].delta.content) || '';
                  if (delta) {
                    this.aiMessages[assistantIdx].content += delta;
                    this.scrollChatToBottom();
                  }
                } catch (e) {
                  // SSE 行解析失败忽略
                }
              }
            }
          } catch (e) {
            const code = e.message;
            const errKey = code === 'rate' ? 'ai.errorRate'
                         : code === 'unlock' ? 'ai.errorUnlock'
                         : code === 'server' ? 'ai.errorGeneric'
                         : 'ai.errorNetwork';
            this.aiMessages[assistantIdx].content = this.t(errKey);
            this.aiErrorMsg = this.t(errKey);
          } finally {
            this.aiMessages[assistantIdx].streaming = false;
            this.aiSending = false;
            this.scrollChatToBottom();
            // 节流持久化（最近 50 条）
            saveState({ aiMessages: this.aiMessages.slice(-50) });
          }
        },

        async generateShareImage() {
          if (!this.result || this.sharing) return;
          if (typeof html2canvas !== 'function') {
            this.showToast(this.t('common.retry') + ' · html2canvas not loaded');
            return;
          }
          this.sharing = true;
          this.showToast(this.t('share.generating'));
          try {
            // 等待 Alpine 完成响应式渲染
            await new Promise(r => setTimeout(r, 50));
            const node = document.getElementById('share-canvas');
            if (!node) throw new Error('share-canvas not found');
            const canvas = await html2canvas(node, {
              width: 1080, height: 1920,
              scale: 1, backgroundColor: '#ffffff', useCORS: true, logging: false
            });
            // 尝试 Web Share API（移动端原生分享）
            if (navigator.share && navigator.canShare) {
              try {
                const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                if (blob) {
                  const file = new File([blob], `mbti-${this.result.code}.png`, { type: 'image/png' });
                  if (navigator.canShare({ files: [file] })) {
                    await navigator.share({
                      files: [file],
                      title: this.t('share.title'),
                      text: `${this.result.code} · ${this.t('share.sub')}`
                    });
                    this.sharing = false; return;
                  }
                }
              } catch (e) { /* fallback to download below */ }
            }
            // 兜底：触发下载
            const dataUrl = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = `mbti-${this.result.code}-${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            this.showToast(this.t('share.downloadTip'), 3000);
          } catch (e) {
            this.showToast((e && e.message) || 'Share failed');
            console.error('[share]', e);
          } finally {
            this.sharing = false;
          }
        }
      };
    }

    /* ============================ Helpers exposed globally ============================ */
    window.calculateMBTI    = calculateMBTI;
    window.generateUnlockCode = generateUnlockCode;
    window.verifyUnlockCode = verifyUnlockCode;
    window.sha256HexUpper   = sha256HexUpper;
  </script>
</body>
